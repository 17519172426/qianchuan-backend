name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Login to Railway
        run: |
          echo "${{ secrets.RAILWAY_TOKEN }}" | railway login --token stdin

      - name: Deploy to Railway
        run: |
          railway up

      - name: Set Environment Variables
        run: |
          railway variables set ACCESS_TOKEN="${{ secrets.ACCESS_TOKEN }}"
          railway variables set REFRESH_TOKEN="${{ secrets.REFRESH_TOKEN }}"
          railway variables set APP_ID="${{ secrets.APP_ID }}"
          railway variables set APP_SECRET="${{ secrets.APP_SECRET }}"

      - name: Get Railway URL
        id: railway
        run: |
          echo "domain=$(railway domain 2>/dev/null)" >> $GITHUB_OUTPUT

