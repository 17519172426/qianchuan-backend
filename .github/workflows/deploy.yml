name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Railway Login
        run: |
          echo "$RAILWAY_TOKEN" > /tmp/railway_token
          railway login --token-file /tmp/railway_token || railway login < /tmp/railway_token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy
        run: |
          railway up --detached

      - name: Set Environment Variables
        run: |
          railway variables set ACCESS_TOKEN="${{ secrets.ACCESS_TOKEN }}"
          railway variables set REFRESH_TOKEN="${{ secrets.REFRESH_TOKEN }}"
          railway variables set APP_ID="${{ secrets.APP_ID }}"
          railway variables set APP_SECRET="${{ secrets.APP_SECRET }}"

